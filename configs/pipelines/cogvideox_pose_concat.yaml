pipeline:
  class: "CogVideoXPoseConcatPipeline"
  transformer_class: "CogVideoXTransformer3DModelWithConcat"
  condition_channels: "auto"  # vae.latent_channels * 2

training_modes:
  full:
    description: "Full fine-tuning of all parameters"
    supported: true
    default: true
    
  lora:
    description: "LoRA fine-tuning with projection layer"
    supported: true
    default: false
    parameters:
      lora_rank: 64
      lora_alpha: 32
      freeze_projection: false

validation:
  enabled: true
  steps: 500
  epochs: 1
  max_videos: 4


