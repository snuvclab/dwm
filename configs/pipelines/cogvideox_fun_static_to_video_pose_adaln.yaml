pipeline:
  class: "CogVideoXFunStaticToVideoPoseAdaLNPipeline"
  transformer_class: "CogVideoXFunTransformer3DModelWithAdaLNPose"
  
adaln:
  pose_dim: 102
  pose_embed_dim: 512
  stride: 4  # Stride for temporal processing

training_modes:
  full:
    description: "Full fine-tuning with AdaLN pose conditioning"
    supported: true
    default: true
    
  lora:
    description: "LoRA fine-tuning with AdaLN pose conditioning"
    supported: true
    default: false
    parameters:
      lora_rank: 64
      lora_alpha: 32

validation:
  enabled: true
  steps: 500
  epochs: 1
  max_videos: 4


