experiment:
  name: "dwm_wan_14b_lora"
  description: "WAN 2.1 14B hand-concat LoRA config for DWM inference and smoke training."
  date: "2026-04-01"
  author: "Byungjun Kim"

pipeline:
  type: "wan2.1_fun_inp_hand_concat"
  base_model_name_or_path: "~/.cache/modelscope/hub/models/PAI/Wan2.1-Fun-V1.1-14B-InP/"

transformer:
  class: "WanTransformer3DModelWithConcat"
  condition_channels: 16

training:
  mode: "lora"
  learning_rate: 1e-4
  batch_size: 1
  max_train_steps: 10000
  gradient_accumulation_steps: 1
  optimizer: "adamw"
  weight_decay: 0.01
  lr_scheduler: "cosine_with_restarts"
  lr_warmup_steps: 100
  lr_num_cycles: 1
  max_grad_norm: 1.0
  beta1: 0.9
  beta2: 0.95
  seed: 42
  lora_rank: 64
  lora_alpha: 64
  trainable_parameter_patterns:
    - "patch_embedding"
  prompt_dropout_prob: 0.0
  hand_dropout_prob: 0.0
  custom_settings:
    mixed_precision: "bf16"
    gradient_checkpointing: true
    load_tensors: true
    random_flip: false
    max_num_frames: 49
    enable_slicing: true
    enable_tiling: true
    allow_tf32: true
    checkpointing_steps: 1000

data:
  dataset_file:
    - "dataset_files/trumans_train.txt"
    - "dataset_files/taste_rob_train.txt"
  validation_set:
    - "dataset_files/trumans_test.txt"
    - "dataset_files/taste_rob_test.txt"
  data_root: "data"
  height_buckets: 480
  width_buckets: 720
  frame_buckets: 49
  dataloader_num_workers: 0
  pin_memory: true
  validation_prompt_separator: ":::"
  num_validation_videos: 1
  max_validation_videos: 4
  init_validation_steps: 250
  validation_steps: 500
  prompt_subdir: "prompts_rewrite"
  prompt_embeds_subdir: "prompt_embeds_rewrite_wan"
  video_latents_subdir: "video_latents_wan"
  static_video_latents_subdir: "static_video_latents_wan"
  hand_video_latents_subdir: "hand_video_latents_wan"
  fun_inp_i2v_latents_subdir: "fun_inp_i2v_latents_wan"

logging:
  report_to: "none"
  tracker_name: "wan_fun_inp_hand_concat_lora"
  project_name: "dwm"
  entity_name: ""
  log_steps: 10
