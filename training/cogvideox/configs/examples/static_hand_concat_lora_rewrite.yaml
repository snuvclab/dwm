experiment:
  name: "static_hand_concat_lora_rewrite"
  description: "Public example config for DWM CogVideoX static-scene and hand-video concat LoRA training"
  date: "2026-03-25"
  author: "Open Source Example"
  output_dir: "outputs/"

pipeline:
  type: "cogvideox_fun_static_to_video_pose_concat"
  condition_channels: 16

training:
  mode: "lora"
  learning_rate: 1e-4
  batch_size: 7
  max_train_steps: 15000
  gradient_accumulation_steps: 2
  optimizer: "adamw"
  weight_decay: 0.01
  lr_scheduler: "cosine_with_restarts"
  lr_warmup_steps: 100
  lr_num_cycles: 1
  max_grad_norm: 1.0
  beta1: 0.9
  beta2: 0.95
  seed: 42
  lora_rank: 64
  lora_alpha: 64
  trainable_parameter_patterns:
    - "patch_embed.proj"
  prompt_dropout_prob: 0.0
  hand_dropout_prob: 0.0
  custom_settings:
    mixed_precision: "bf16"
    gradient_checkpointing: true
    load_tensors: true
    random_flip: false
    max_num_frames: 49
    enable_slicing: true
    enable_tiling: true
    allow_tf32: true
    checkpointing_steps: 500

data:
  dataset_file:
    - "dataset_files/trumans_smoke/train.txt"
    - "dataset_files/taste_rob_smoke/train.txt"
  validation_set:
    - "dataset_files/trumans_smoke/val.txt"
    - "dataset_files/taste_rob_smoke/val.txt"
  data_root: "data_refactor"
  height_buckets: 480
  width_buckets: 720
  frame_buckets: 49
  dataloader_num_workers: 4
  pin_memory: true
  validation_prompt_separator: ":::"
  num_validation_videos: 1
  max_validation_videos: 2
  init_validation_steps: 250
  validation_steps: 500
  use_gray_hand_videos: false
  split_hands: false
  prompt_subdir: "prompts_rewrite"
  prompt_embeds_subdir: "prompt_embeds_prompts_rewrite"
  hand_video_subdir: "videos_hands"
  hand_video_latents_subdir: "hand_video_latents"
  static_video_subdir: "videos_static"
  static_video_latents_subdir: "static_video_latents"
  video_latents_subdir: "video_latents"

model:
  base_model_name_or_path: "alibaba-pai/CogVideoX-Fun-V1.1-5b-InP"

logging:
  report_to: "none"
  tracker_name: "static-hand-concat-lora-rewrite"
  project_name: "dwm"
  entity_name: ""
  log_steps: 10

slurm:
  job_name: "static_hand_concat_lora_rewrite"
  nodes: 1
  gpus: 4
  partition: "debug"
  output: "out/static_hand_concat_lora_rewrite_%j.out"
  error: "out/static_hand_concat_lora_rewrite_%j.err"

environment:
  torch_logs: "+dynamo,recompiles,graph_breaks"
  torchdynamo_verbose: 1
  wandb_mode: "offline"
  torch_nccl_enable_monitoring: 0
  tokenizers_parallelism: true
  omp_num_threads: 16
  nccl_timeout: 1800
